name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_AUTH: ghcr.io/${{ github.repository_owner }}/pr8-auth
  IMAGE_TASKS: ghcr.io/${{ github.repository_owner }}/pr8-tasks

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify Go version
        run: go version

      - name: Sync workspace
        run: go work sync

      - name: Run tests for auth
        run: cd services/auth && go test ./...

      - name: Run tests for tasks
        run: cd services/tasks && go test ./...

      - name: Run tests for shared
        run: cd shared && go test ./...

      - name: Build auth
        run: go build ./services/auth/cmd/auth

      - name: Build tasks
        run: go build ./services/tasks/cmd/tasks

  docker:
    runs-on: ubuntu-latest
    needs: test-build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_AUTH }}:latest
            ${{ env.IMAGE_AUTH }}:${{ steps.vars.outputs.sha_short }}

      - name: Build and push tasks image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/tasks/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TASKS }}:latest
            ${{ env.IMAGE_TASKS }}:${{ steps.vars.outputs.sha_short }}